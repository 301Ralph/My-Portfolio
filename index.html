<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- REMIXICONS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.css" integrity="sha512-kJlvECunwXftkPwyvHbclArO8wszgBGisiLeuDFwNM8ws+wKIw0sv1os3ClWZOcrEB2eRXULYUsm8OVRGJKwGA==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- CSS -->
    <link rel="stylesheet" href="assets/css/style.css">

    <title>My Portfolio</title>
</head>
<body>
    <header class="header" id="header">
        <div class="blob-animate"></div>

        <nav class="nav container">
            <a href="#" class="nav__logo">Ralph</a>

            <div class="nav__menu">
                <ul class="nav__list">
                    <li>
                        <a href="#about" class="nav__link">About us</a>
                    </li>

                    <li>
                        <a href="#projects" class="nav__link">Projects</a>
                    </li>

                    <li>
                        <a href="#contact" class="nav__link">Contact</a>
                    </li>
                </ul>
            </div>
        </nav>
    </header>
    
    <main class="main">
        <section class="home section">
            <div class="home__shadow"></div>

            <div class="home__container container grid">
                <div class="home__data">
                    <h3 class="home__greeting">Hello, I'm</h3>
                    <h1 class="home__name">Ralph</h1>
                </div>

                <div class="home__image">
                    <div class="blob-animate"></div>
                    <img src="assets/img/Blue Lock.jpg" alt="image" class="home__ralph">
                </div>

                <div class="home__info">
                    <h3 class="home__split">Creative</h3>
                    <h2 class="home__profession-1">Web Developer</h2>
                    <h2 class="home__profession-2">& Designer</h2>
                </div>

                <div class="home__social">
                    <a href="https://www.linkedin.com/in/escote-ralph-aian-b-156b76327/" target="_blank" class="home__social-link">
                        <i class="ri-linkedin-box-line"></i>
                    </a>

                    <a href="https://github.com/301Ralph" target="_blank" class="home__social-link">
                        <i class="ri-github-line"></i>
                    </a>

                    <a href="https://www.instagram.com/_http.raia/" target="_blank" class="home__social-link">
                        <i class="ri-instagram-line"></i>
                    </a>
                </div>

                <a href="assets/img/pdf/resume.pdf" download target="_blank" class="home__cv">
                    Download CV
                </a>
            </div>
        </section>

        <section class="about  section" id="about">
            <div class="about__shadow"></div>

            <div class="about__container container grid">
                <div class="about__data">
                    <h2 class="section__title">
                        <span>Programming</span>
                        <br> Is My Passion
                    </h2>

                    <p class="about__description"></p>
                </div>

                <div class="about__image">

                </div>
            </div>
        </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/animejs/dist/bundles/anime.umd.min.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
